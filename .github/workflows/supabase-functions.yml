name: Deploy Supabase AI Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-ai-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: gdrpihlnfrfmnsbvrooc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate deployment secret
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Add SUPABASE_ACCESS_TOKEN to the repository Actions secrets."
            exit 1
          fi
      - name: Deploy wine advice
        run: npx --yes supabase@latest functions deploy wine-advice --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
      - name: Deploy complementary wine tools
        run: npx --yes supabase@latest functions deploy wine-tools --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
